<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>3md gallery</title>
<meta name="description" content="Browse curated animated .3md examples, organized into categories. Tap a card to open it live and interactive." />
<link rel="icon" href="assets/favicon.svg" />
<meta property="og:type" content="website" />
<meta property="og:title" content="3md gallery" />
<meta property="og:description" content="Browse curated animated .3md examples by category. Games, animation, data, story, and more, each rendered live." />
<meta property="og:url" content="https://corvidlabs.github.io/3md/gallery.html" />
<meta property="og:image" content="https://corvidlabs.github.io/3md/social-preview.png" />
<meta property="og:image:width" content="1280" />
<meta property="og:image:height" content="640" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="3md gallery" />
<meta name="twitter:image" content="https://corvidlabs.github.io/3md/social-preview.png" />

<!-- CorvidLabs theme pre-paint (must run before CSS) -->
<script>
  (() => { try {
    const q = new URLSearchParams(location.search).get("theme");
    const t = q || localStorage.getItem("corvid-theme");
    if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
  } catch (_) {} })();
</script>

<link rel="stylesheet" href="assets/tokens.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;700;900&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:var(--font-display);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;
    background-image:linear-gradient(var(--ink-06) 1px,transparent 1px),linear-gradient(90deg,var(--ink-06) 1px,transparent 1px);
    background-size:48px 48px;
    overflow-x:hidden;
  }
  .wrap{max-width:1320px;margin:0 auto;padding:0 22px}
  a{color:var(--sheen);text-decoration:none} a:hover{text-decoration:underline}
  .mono{font-family:var(--font-mono)}
  .irid{height:3px;border:0;background:var(--iridescence);margin:0}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--hairline);gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:13px;letter-spacing:.04em;color:var(--ink)}
  .brand svg{width:25px;height:25px;color:var(--ink)}
  .topbar-right{display:flex;align-items:center;gap:14px}
  .backlink{font-family:var(--font-mono);font-size:12px;letter-spacing:.04em;color:var(--text-faint)}
  .backlink a{color:var(--sheen)}
  .eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint)}

  header.hero{padding:30px 0 8px}
  .wordmark{font-family:var(--font-display);font-weight:900;font-size:clamp(40px,8vw,80px);line-height:.86;letter-spacing:-.04em;margin:10px 0 0;color:var(--ink)}
  .wordmark .z{color:var(--sheen)}
  .tagline{font-size:clamp(16px,2vw,21px);max-width:50ch;margin:12px 0 0;font-weight:400;color:var(--ink)}
  .tagline em{color:var(--sheen);font-style:italic}

  /* controls: search + category chips */
  .controls{position:sticky;top:0;z-index:30;background:var(--paper);padding:16px 0 12px;margin-top:14px;border-bottom:1px solid var(--hairline)}
  .searchrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .search{flex:1;min-width:200px;font-family:var(--font-mono);font-size:14px;color:var(--ink);background:var(--surface);border:1px solid var(--hairline);padding:11px 14px;border-radius:6px;outline:none}
  .search:focus{border-color:var(--sheen)}
  .search::placeholder{color:var(--text-faint)}
  .count{font-family:var(--font-mono);font-size:12.5px;color:var(--text-faint);white-space:nowrap}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
  .chip{flex:0 0 auto;font-family:var(--font-mono);font-size:12.5px;padding:7px 13px;border-radius:999px;cursor:pointer;border:1px solid var(--hairline);color:var(--text-muted);background:var(--surface);transition:.15s;user-select:none;white-space:nowrap}
  .chip:hover{border-color:var(--sheen);color:var(--sheen)}
  .chip[aria-pressed="true"]{color:var(--paper);background:var(--sheen);border-color:var(--sheen);font-weight:500}
  .chip .n{opacity:.6;margin-left:5px}

  /* card grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;margin:24px 0 40px}
  @media(max-width:560px){.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}}
  .card{display:flex;flex-direction:column;border:1px solid var(--hairline);border-radius:10px;background:var(--surface);overflow:hidden;cursor:pointer;text-align:left;padding:0;color:inherit;transition:transform .15s,border-color .15s,box-shadow .15s}
  .card:hover{transform:translateY(-3px);border-color:var(--sheen);box-shadow:0 14px 30px var(--ink-12);text-decoration:none}
  .card:focus-visible{outline:2px solid var(--sheen);outline-offset:2px}
  .thumb{position:relative;aspect-ratio:4/3;background:var(--surface-strong);overflow:hidden;display:flex;align-items:center;justify-content:center}
  .thumb img{width:100%;height:100%;object-fit:contain;display:block;padding:8px;background:var(--surface-strong)}
  .thumb .ph{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);padding:10px;text-align:center}
  .thumb .ax{position:absolute;left:8px;bottom:8px;font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--paper);background:var(--ink-70);padding:3px 7px;border-radius:4px;backdrop-filter:blur(2px)}
  .cardbody{padding:11px 13px 13px;display:flex;flex-direction:column;gap:6px;flex:1}
  .badge{align-self:flex-start;font-family:var(--font-mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:999px;color:var(--paper);font-weight:600}
  .ctitle{font-family:var(--font-display);font-weight:700;font-size:15px;line-height:1.3;color:var(--ink);margin:0}
  @media(max-width:560px){.ctitle{font-size:13.5px}.cardbody{padding:9px 10px 11px}}
  .cslug{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);margin-top:auto}
  .empty{font-family:var(--font-mono);font-size:13px;color:var(--text-faint);padding:40px 0;text-align:center;grid-column:1/-1}

  /* modal */
  .modal{position:fixed;inset:0;z-index:100;background:color-mix(in srgb,var(--ink) 62%,transparent);display:flex;align-items:center;justify-content:center;padding:18px}
  .modal[hidden]{display:none}
  .modal-card{position:relative;width:min(960px,96vw);max-height:94vh;overflow:auto;background:var(--paper);border:1px solid var(--hairline);border-radius:12px;padding:18px 18px 16px;box-shadow:0 30px 80px var(--ink-70)}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
  .modal-title{font-family:var(--font-display);font-weight:700;font-size:clamp(18px,3vw,24px);margin:0;color:var(--ink)}
  .modal-sub{font-family:var(--font-mono);font-size:12px;color:var(--text-faint);margin-top:3px}
  .modal-close{flex:0 0 auto;font-size:22px;line-height:1;width:36px;height:36px;border-radius:8px;border:1px solid var(--hairline);background:var(--surface);color:var(--ink);cursor:pointer}
  .modal-close:hover{border-color:var(--sheen);color:var(--sheen)}
  .modal-tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0 4px}
  .modal-tools label{font-family:var(--font-mono);font-size:12px;color:var(--text-faint)}
  .modal-tools select{font-family:var(--font-mono);font-size:13px;padding:7px 10px;border-radius:6px;border:1px solid var(--hairline);background:var(--surface);color:var(--ink)}
  .modal-tools .open{margin-left:auto;font-family:var(--font-mono);font-size:13px;padding:8px 14px;border-radius:6px;border:1px solid var(--sheen);color:var(--sheen);background:var(--surface)}
  three-md{
    --three-md-accent:var(--sheen);--three-md-bg:var(--surface-strong);--three-md-surface:var(--surface);
    --three-md-text:var(--ink);--three-md-muted:var(--text-muted);--three-md-faint:var(--text-faint);
    --three-md-hairline:var(--hairline);--three-md-height:58vh;
    display:block;width:100%;
  }

  footer{border-top:1px solid var(--hairline);margin-top:10px;padding:24px 0 64px;display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;align-items:center}
  .pill{font-family:var(--font-mono);font-size:12px;color:var(--text-faint);display:flex;align-items:center;gap:8px}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 0 0 color-mix(in srgb,var(--success) 60%,transparent);animation:pulse 2s infinite}
  @keyframes pulse{70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}

  .corvid-theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;padding:0;background:none;border:1px solid var(--ink-12);color:var(--ink-70);cursor:pointer;transition:border-color .2s,color .2s;border-radius:3px}
  .corvid-theme-toggle:hover{border-color:var(--sheen);color:var(--sheen)}
  .corvid-theme-toggle:focus-visible{outline:2px solid var(--sheen);outline-offset:2px}
  .corvid-theme-toggle svg{width:17px;height:17px}
  .corvid-theme-toggle .moon{display:none}
  :root[data-theme="dark"] .corvid-theme-toggle .sun{display:none}
  :root[data-theme="dark"] .corvid-theme-toggle .moon{display:inline}
  @media (prefers-color-scheme:dark){:root:not([data-theme="light"]) .corvid-theme-toggle .sun{display:none}:root:not([data-theme="light"]) .corvid-theme-toggle .moon{display:inline}}
  :root[data-theme="light"] .corvid-theme-toggle .sun{display:inline}
  :root[data-theme="light"] .corvid-theme-toggle .moon{display:none}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <svg viewBox="0 0 64 64" aria-label="CorvidLabs"><circle cx="24" cy="32" r="18" fill="currentColor"/><path d="M33 21.5 L58.5 29.5 L33 39.5 Z" fill="currentColor"/><circle cx="27.5" cy="26" r="3" fill="var(--paper)"/></svg>
      <span>CorvidLabs</span>
    </div>
    <div class="topbar-right">
      <span class="backlink mono"><a href="viewer.html">viewer &amp; editor</a> &middot; <a href="index.html">home</a></span>
      <button type="button" class="corvid-theme-toggle" data-corvid-theme-toggle aria-pressed="false" aria-label="Switch to dark theme" title="Switch theme">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.6v2.4M12 19v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.6 12h2.4M19 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A8.6 8.6 0 1 1 11.2 3a6.7 6.7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </div>

  <header class="hero">
    <div class="eyebrow">the .3md gallery</div>
    <h1 class="wordmark" id="wordmark">examples<span class="z">.</span></h1>
    <p class="tagline">A tight set of animated examples, sorted into <em>categories</em>. Tap any card to open it live and interactive, or jump to the full viewer.</p>
  </header>

  <div class="controls">
    <div class="searchrow">
      <input type="search" class="search" id="search" placeholder="search title, slug, axis, category..." aria-label="search examples" autocomplete="off" />
      <span class="count" id="count"></span>
    </div>
    <div class="chips" id="chips" role="group" aria-label="filter by category"></div>
  </div>

  <main class="grid" id="grid" aria-live="polite"></main>

  <footer>
    <div class="pill"><span class="pulse"></span> <span id="footcount">CI green</span></div>
    <div class="pill mono"><a href="https://github.com/CorvidLabs/3md">github.com/CorvidLabs/3md</a></div>
  </footer>
</div>

<!-- modal -->
<div class="modal" id="modal" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-card">
    <div class="modal-head">
      <div>
        <h2 class="modal-title" id="modalTitle">&nbsp;</h2>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" id="modalClose" aria-label="close">&times;</button>
    </div>
    <three-md id="live"></three-md>
    <div class="modal-tools">
      <label for="modeSel">view</label>
      <select id="modeSel">
        <option value="">auto (from axis)</option>
        <option value="stack">deck</option>
        <option value="layers">layers</option>
        <option value="elevator">elevator (floors)</option>
        <option value="play">animation</option>
        <option value="single">reader</option>
        <option value="present">slides</option>
        <option value="blend">3D object</option>
        <option value="map">map</option>
      </select>
      <a class="open" id="openViewer" href="#">open in full viewer &rarr;</a>
    </div>
  </div>
</div>

<script defer src="assets/theme.js"></script>
<script type="module" src="assets/three-md.js?v=1.7.17"></script>
<script>
const CAT_COLORS = {
  Games:"#e0567a", Animation:"#e08a3c", Data:"#3c9ae0", Information:"#6c7a89",
  Notes:"#7c8c3c", Education:"#3cb0a0", Business:"#9a6ce0", Creative:"#e05c9e",
  Health:"#43b365", Home:"#c0913c", Maps:"#3c7ce0", Story:"#b05ce0", Engineering:"#5a6cd0",
  Entertainment:"#e0467a",
};
const CAT_ORDER = ["Games","Entertainment","Animation","Story","Creative","Data","Information","Education","Business","Engineering","Health","Home","Maps","Notes"];

let EXAMPLES = [], activeCat = "Featured", query = "";
const grid = document.getElementById("grid");
const chips = document.getElementById("chips");
const search = document.getElementById("search");
const countEl = document.getElementById("count");
const esc = (s)=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const planeCount = (src)=>(src.match(/^@plane\b/gm)||[]).length || 1;

function b64(src){
  // base64url of UTF-8 source, for viewer.html#<hash>
  const bytes = new TextEncoder().encode(src);
  let bin=""; for(const b of bytes) bin+=String.fromCharCode(b);
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

function buildChips(){
  const counts = {}; for(const e of EXAMPLES) counts[e.category]=(counts[e.category]||0)+1;
  const featured = EXAMPLES.filter(e=>e.featured).length;
  const cats = CAT_ORDER.filter(c=>counts[c]);
  // [catKey, label, count]
  const all = [["Featured","★ Featured",featured], ["All","All",EXAMPLES.length], ...cats.map(c=>[c,c,counts[c]])];
  chips.innerHTML = all.map(([key,label,n])=>
    `<button class="chip" type="button" role="button" data-cat="${esc(key)}" aria-pressed="${key===activeCat}">${esc(label)}<span class="n">${n}</span></button>`
  ).join("");
  chips.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{ activeCat=b.dataset.cat; chips.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed", String(x.dataset.cat===activeCat))); render(); });
}

function visible(){
  const q = query.trim().toLowerCase();
  return EXAMPLES.filter(e=>{
    if(activeCat==="Featured" && !e.featured) return false;
    else if(activeCat!=="All" && activeCat!=="Featured" && e.category!==activeCat) return false;
    if(!q) return true;
    return `${e.title} ${e.slug} ${e.axis} ${e.category}`.toLowerCase().includes(q);
  });
}

function render(){
  const items = visible();
  countEl.textContent = `${items.length} of ${EXAMPLES.length}`;
  if(!items.length){ grid.innerHTML = `<div class="empty">no examples match that filter</div>`; return; }
  grid.innerHTML = items.map(e=>{
    const col = CAT_COLORS[e.category]||"#6c7a89";
    return `<button class="card" type="button" data-slug="${esc(e.slug)}">
      <div class="thumb">
        <img loading="lazy" src="gifs/${esc(e.slug)}.gif" alt="${esc(e.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="ph" style="display:none">${esc(e.title)}</span>
        <span class="ax">${esc(e.axis)} &middot; ${planeCount(e.src)} planes</span>
      </div>
      <div class="cardbody">
        <span class="badge" style="background:${col}">${esc(e.category)}</span>
        <h3 class="ctitle">${esc(e.title)}</h3>
        <span class="cslug">${esc(e.slug)}.3md</span>
      </div>
    </button>`;
  }).join("");
  grid.querySelectorAll(".card").forEach(c=>c.onclick=()=>openModal(c.dataset.slug));
}

/* ---------- modal ---------- */
const modal = document.getElementById("modal");
const live = document.getElementById("live");
const modeSel = document.getElementById("modeSel");
let modalEx = null;

function openModal(slug){
  const e = EXAMPLES.find(x=>x.slug===slug); if(!e) return;
  modalEx = e;
  document.getElementById("modalTitle").textContent = e.title;
  document.getElementById("modalSub").textContent = `${e.category} · axis: ${e.axis} · ${e.slug}.3md`;
  document.getElementById("openViewer").href = "viewer.html#" + b64(e.src);
  modeSel.value = "";
  live.removeAttribute("mode");
  live.setSource ? live.setSource(e.src) : live.setAttribute("source", e.src);
  modal.hidden = false;
  document.body.style.overflow = "hidden";
  document.getElementById("modalClose").focus();
}
function closeModal(){
  modal.hidden = true; document.body.style.overflow = "";
  if(live.pause) live.pause();
}
modeSel.onchange = ()=>{ if(modeSel.value) live.setAttribute("mode", modeSel.value); else live.removeAttribute("mode"); };
document.getElementById("modalClose").onclick = closeModal;
modal.addEventListener("click", e=>{ if(e.target===modal) closeModal(); });
window.addEventListener("keydown", e=>{ if(e.key==="Escape" && !modal.hidden) closeModal(); });

search.addEventListener("input", ()=>{ query=search.value; render(); });

/* ---------- boot ---------- */
fetch("gallery-data.json")
  .then(r=>{ if(!r.ok) throw new Error("gallery-data.json "+r.status); return r.json(); })
  .then(data=>{
    EXAMPLES = Array.isArray(data)?data:[];
    const n = EXAMPLES.length;
    document.getElementById("wordmark").innerHTML = `${n} examples<span class="z">.</span>`;
    document.title = `3md gallery · ${n} examples`;
    document.getElementById("footcount").textContent = `CI green · Swift + TS + Rust parsers · ${n} example documents`;
    buildChips(); render();
  })
  .catch(err=>{ grid.innerHTML = `<div class="empty">Could not load gallery data.</div>`; console.error(err); });
</script>
</body>
</html>
