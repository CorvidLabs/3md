name: trust

on:
  # Skip the gate for documentation-only changes (it has nothing code to verify).
  # Anything that touches code, web/, specs/, SPEC.md, or conformance still runs.
  pull_request:
    paths-ignore:
      - "README.md"
      - "ROADMAP.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "LICENSE"
      - "**/*.png"
      - ".github/ISSUE_TEMPLATE/**"
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "ROADMAP.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "LICENSE"
      - "**/*.png"
      - ".github/ISSUE_TEMPLATE/**"
  workflow_dispatch:

jobs:
  trust:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                 # augur/attest need full history

      - name: Install swift-format
        run: brew install swift-format

      # The verify lane also runs the TypeScript suite via bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The lifecycle preserves this repository's pre-migration strict
      # SpecSync check; Trust's composed contract step still owns the gate.
      - name: Install SpecSync 5.0.1 for lifecycle verification
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/specsync-macos-aarch64.tar.gz"
          checksum="$archive.sha256"
          base="https://github.com/CorvidLabs/spec-sync/releases/download/v5.0.1"
          curl -fsSL "$base/specsync-macos-aarch64.tar.gz" -o "$archive"
          curl -fsSL "$base/specsync-macos-aarch64.tar.gz.sha256" -o "$checksum"
          expected="$(awk '{print $1}' "$checksum")"
          actual="$(shasum -a 256 "$archive" | awk '{print $1}')"
          test "$actual" = "$expected"
          mkdir -p "$RUNNER_TEMP/specsync-bin"
          tar -xzf "$archive" -C "$RUNNER_TEMP/specsync-bin"
          mv "$RUNNER_TEMP/specsync-bin/specsync-macos-aarch64" "$RUNNER_TEMP/specsync-bin/specsync"
          chmod +x "$RUNNER_TEMP/specsync-bin/specsync"
          echo "$RUNNER_TEMP/specsync-bin" >> "$GITHUB_PATH"

      # Preserve the former warning-as-error contract without placing SpecSync
      # inside its own configured verification command.
      - name: Strict SpecSync contract
        run: specsync check --strict --force --require-coverage 100

      # Unified lifecycle, contract, risk, and progressive provenance gate.
      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@9d32b5786d2e9e4d39fc581c0091c721ee3d4226 # v1.0.0

      # Durability: fail if the standing rules block was removed.
      - name: Trust block present
        run: |
          grep -q "CorvidLabs trust toolchain: BEGIN" AGENTS.md
