name: publish

# Publishes the two npm packages to the public npm registry on each GitHub release:
# @corvidlabs/threemd (the parser) and @corvidlabs/three-md-element (the
# canonical <three-md> web component, which bundles the parser at build time).
# Authenticates via npm Trusted Publishers (OIDC) — no NPM_TOKEN secret needed.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@corvidlabs"
      - run: bun install --frozen-lockfile
      - name: Sync package version to the release tag
        if: github.event_name == 'release'
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
        env:
          TAG: ${{ github.event.release.tag_name }}
      - run: npm publish --provenance --access public

  element:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: element
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@corvidlabs"
      # Installs typescript for the .d.ts build. The bundle imports the parser
      # from source (../../js/src), so it needs no other dependency.
      - run: bun install
      - name: Sync package version to the release tag
        if: github.event_name == 'release'
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
        env:
          TAG: ${{ github.event.release.tag_name }}
      # prepublishOnly builds dist (bundle + types) before publishing.
      - run: npm publish --provenance --access public
