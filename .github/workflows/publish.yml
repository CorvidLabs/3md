name: publish

# Publishes @corvidlabs/threemd to GitHub Packages on each GitHub release,
# matching the CorvidLabs convention (see CorvidLabs/ts-algochat). The built-in
# GITHUB_TOKEN authenticates to npm.pkg.github.com, so no npm login is needed.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@corvidlabs"
      - run: bun install --frozen-lockfile
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
