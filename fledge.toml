# fledge.toml - project task definitions and lanes
# Detected project type: swift
#
# Trust is the complete repository gate (see AGENTS.md). The `verify` lane is
# its native implementation-verification component.

[tasks]
# swift format unifies formatting and linting. `fmt` fixes in place; `lint`
# is the non-mutating check that the verify lane and CI run.
fmt = "swift-format format --in-place --recursive Sources Tests Package.swift"
lint = "swift-format lint --strict --recursive Sources Tests Package.swift"
build = "swift build"
test = "swift test"
element-bundle = "bun scripts/check-element-bundle.mjs"

[tasks.editor]
cmd = "bun install --frozen-lockfile && bun run test"
dir = "editor/vscode"
description = "VS Code grammar tests for 3md syntax highlighting and cross-plane links."

[tasks.ui]
cmd = "bun install --frozen-lockfile && bun run test"
dir = "uitests"
description = "Playwright UI suite for the web viewer, gallery, and custom element."

[tasks.rust]
cmd = "cargo fmt --check && cargo clippy --all-targets -- -D warnings && cargo test"
dir = "rust"
description = "Rust crate: format check, clippy, and tests (runs the shared conformance vectors)."

[tasks.js]
cmd = "bun install --frozen-lockfile && bun test"
dir = "js"
description = "TypeScript port: install and run the test suite (the shared conformance vectors)."

[lanes.verify]
description = "Native verification for all three parser implementations, generated element bundle drift, and editor grammar. Trust runs SpecSync after this lane."
steps = ["lint", "build", "test", "js", "rust", "element-bundle", "editor"]

[lanes.ci]
description = "Alias for the native verify lane."
steps = ["lint", "build", "test", "js", "rust", "element-bundle", "editor"]

[lanes.ui]
description = "Browser UI suite for the published web surfaces."
steps = ["ui"]
