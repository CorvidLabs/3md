# fledge.toml - project task definitions and lanes
# Detected project type: swift
#
# The single CI gate is the `verify` lane (see AGENTS.md). Run it with:
#   fledge lanes run verify

[tasks]
# swift format unifies formatting and linting. `fmt` fixes in place; `lint`
# is the non-mutating check that the verify lane and CI run.
fmt = "swift-format format --in-place --recursive Sources Tests Package.swift"
lint = "swift-format lint --strict --recursive Sources Tests Package.swift"
build = "swift build"
test = "swift test"

[tasks.rust]
cmd = "cargo fmt --check && cargo clippy --all-targets -- -D warnings && cargo test"
dir = "rust"
description = "Rust crate: format check, clippy, and tests (runs the shared conformance vectors)."

[lanes.verify]
description = "The single CI gate: Swift format/build/test plus the Rust crate."
steps = ["lint", "build", "test", "rust"]

[lanes.ci]
description = "Alias for the verify gate."
steps = ["lint", "build", "test", "rust"]
